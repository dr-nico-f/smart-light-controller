<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Light Controller</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0%25' stop-color='%23a78bfa'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><circle cx='50' cy='38' r='26' fill='url(%23g)'/><rect x='40' y='62' width='20' height='10' rx='3' fill='%236b7280'/><rect x='43' y='72' width='14' height='4' rx='2' fill='%236b7280'/><circle cx='50' cy='38' r='26' fill='url(%23g)' opacity='.4' filter='blur(8px)'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08090d;
  --surface: rgba(255, 255, 255, 0.03);
  --surface-border: rgba(255, 255, 255, 0.06);
  --surface-hover: rgba(255, 255, 255, 0.06);
  --glass: rgba(15, 18, 30, 0.7);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text: #f0f0f3;
  --text-secondary: #9ca3af;
  --text-dim: #6b7280;
  --accent: #7c3aed;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --accent-soft: rgba(124, 58, 237, 0.15);
  --success: #10b981;
  --success-glow: rgba(16, 185, 129, 0.4);
  --danger: #ef4444;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background orbs */
body::before,
body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: -1;
  opacity: 0.6;
}

body::before {
  width: 600px;
  height: 600px;
  top: -10%;
  left: -5%;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
  animation: orbFloat1 14s ease-in-out infinite alternate;
}

body::after {
  width: 500px;
  height: 500px;
  bottom: -10%;
  right: -5%;
  background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
  animation: orbFloat2 18s ease-in-out infinite alternate;
}

@keyframes orbFloat1 {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(4vw, 6vh) scale(1.1); }
  100% { transform: translate(-2vw, 3vh) scale(0.95); }
}

@keyframes orbFloat2 {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-5vw, -4vh) scale(1.05); }
  100% { transform: translate(3vw, -6vh) scale(0.9); }
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 48px;
}

header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #7c3aed 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 60px rgba(124, 58, 237, 0.3);
}

header .subtitle {
  color: var(--text-secondary);
  margin-top: 6px;
  font-size: 0.9rem;
  font-weight: 400;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 20px;
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.status-pill .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success-glow);
  animation: pulse 2s ease-in-out infinite;
}

.status-pill .dot.demo { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Section Headers */
.section-header {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding-left: 14px;
  position: relative;
}

.section-header::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

section { margin-bottom: 40px; }

/* Device Cards */
.device-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}

.device-card:nth-child(1) { animation-delay: 0.05s; }
.device-card:nth-child(2) { animation-delay: 0.1s; }
.device-card:nth-child(3) { animation-delay: 0.15s; }
.device-card:nth-child(4) { animation-delay: 0.2s; }
.device-card:nth-child(5) { animation-delay: 0.25s; }
.device-card:nth-child(6) { animation-delay: 0.3s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Colour accent strip at top of card */
.device-card .colour-strip {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  background: transparent;
  transition: background 0.4s, box-shadow 0.4s;
}

.device-card .colour-strip.active {
  height: 3px;
  box-shadow: 0 2px 12px var(--strip-colour, transparent);
}

.device-card.off {
  opacity: 0.5;
}

.device-card.off .colour-strip {
  opacity: 0.2;
}

.device-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.05) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.device-card:hover {
  border-color: rgba(124, 58, 237, 0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(124, 58, 237, 0.1);
}

.device-card:hover::before { opacity: 1; }

.device-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
  position: relative;
}

.device-info h3 {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
}

.device-info .meta {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 3px;
}

/* Toggle */
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
  flex-shrink: 0;
}

.toggle input { display: none; }

.toggle .slider {
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 11px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.toggle .slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: var(--text-secondary);
  border-radius: 50%;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.toggle input:checked + .slider {
  background: var(--success);
  box-shadow: 0 0 12px var(--success-glow);
}

.toggle input:checked + .slider::before {
  transform: translateX(18px);
  background: white;
}

/* Brightness Slider */
.brightness-control {
  position: relative;
  margin-top: 14px;
}

.brightness-control .label-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.brightness-control .label-row .val {
  color: var(--text-secondary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.2) 100%);
  outline: none;
  transition: height 0.2s;
}

input[type="range"]:hover { height: 6px; }

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.3);
  box-shadow: 0 0 12px rgba(255,255,255,0.5);
}

/* Room Groups */
.room-group {
  margin-bottom: 18px;
}

.room-group:last-child { margin-bottom: 0; }

.room-label {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 10px;
  text-transform: capitalize;
}

.room-devices {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

/* Colour Target Bar */
.colour-target-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.colour-target-bar .label {
  font-size: 0.68rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-right: 4px;
}

.target-pill {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--glass-border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
}

.target-pill:hover {
  border-color: rgba(255,255,255,0.15);
  color: var(--text);
}

.target-pill.active {
  background: var(--accent-soft);
  border-color: rgba(124, 58, 237, 0.5);
  color: var(--text);
  box-shadow: 0 0 10px rgba(124, 58, 237, 0.15);
}

/* Colour Presets */
.colour-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 4px;
  align-items: center;
}

.colour-btn.active {
  border-color: white;
  box-shadow: 0 0 14px var(--glow-colour, rgba(255,255,255,0.4)), inset 0 0 0 1px rgba(255,255,255,0.3);
  transform: scale(1.15);
}

@keyframes colourPop {
  0% { transform: scale(1.15); }
  50% { transform: scale(1.35); }
  100% { transform: scale(1.15); }
}

/* Custom Colour Picker */
.colour-picker-inline {
  position: relative;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
  border-radius: 50%;
  background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
  padding: 3px;
}

.colour-picker-inline input[type="color"] {
  -webkit-appearance: none;
  width: 100%;
  height: 100%;
  border: 2px solid var(--bg);
  border-radius: 50%;
  background: none;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.colour-picker-inline input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.colour-picker-inline input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

.colour-picker-inline:hover {
  transform: scale(1.35);
  box-shadow: 0 0 14px rgba(255,255,255,0.25);
}

.colour-picker-inline .picker-label {
  display: none;
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.68rem;
  white-space: nowrap;
  pointer-events: none;
  color: var(--text);
}

.colour-picker-inline:hover .picker-label { display: block; }

/* Keyboard Hints */
.kbd-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 0;
  margin-top: 8px;
}

.kbd-hint {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.68rem;
  color: var(--text-dim);
}

kbd {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  font-family: inherit;
  font-size: 0.65rem;
  color: var(--text-secondary);
}

.colour-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.3);
  animation: swatchIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}

@keyframes swatchIn {
  from { opacity: 0; transform: scale(0); }
  to { opacity: 1; transform: scale(1); }
}

.colour-btn:hover {
  transform: scale(1.35);
  border-color: rgba(255, 255, 255, 0.8);
  box-shadow: 0 0 16px var(--glow-colour, rgba(255,255,255,0.3));
}

.colour-btn .tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.68rem;
  white-space: nowrap;
  pointer-events: none;
  color: var(--text);
}

.colour-btn:hover .tooltip { display: block; }

/* Scenes */
.scenes-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.scene-btn {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.scene-btn:hover {
  background: var(--accent-soft);
  border-color: rgba(124, 58, 237, 0.4);
  color: var(--text);
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
  transform: translateY(-1px);
}

.scene-btn:active {
  transform: translateY(0);
}

.scene-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 4px 20px var(--accent-glow);
}

/* Transitions Panel */
.transitions-panel {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
}

.transitions-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 16px;
  align-items: end;
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field select,
.field input[type="number"] {
  width: 100%;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.85rem;
  transition: border-color 0.2s;
}

.field select:focus,
.field input[type="number"]:focus {
  outline: none;
  border-color: rgba(124, 58, 237, 0.5);
}

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #6d28d9);
  color: white;
  box-shadow: 0 4px 16px var(--accent-glow);
  position: relative;
  overflow: hidden;
}

.btn-primary::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -75%;
  width: 50%;
  height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: skewX(-20deg);
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { left: -75%; }
  50% { left: 125%; }
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: rgba(255,255,255,0.12);
}

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
}

.toast {
  background: var(--glass);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 0.8rem;
  animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  max-width: 320px;
  color: var(--text-secondary);
}

.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(30px) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

/* Responsive */
@media (max-width: 768px) {
  .room-devices { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .transitions-grid { grid-template-columns: 1fr; }
  .container { padding: 24px 16px; }
  header h1 { font-size: 1.5rem; }
  .kbd-bar { display: none; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Smart Light Controller</h1>
    <p class="subtitle">Local-first Tuya bulb control</p>
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span>Connecting...</span>
    </div>
  </header>

  <section>
    <div class="section-header">Devices</div>
    <div id="devicesGrid"></div>
  </section>

  <section>
    <div class="section-header">Colours</div>
    <div class="colour-target-bar" id="colourTargetBar"></div>
    <div class="colour-grid" id="colourGrid"></div>
  </section>

  <section>
    <div class="section-header">Scenes</div>
    <div class="scenes-grid" id="scenesGrid"></div>
  </section>

  <section>
    <div class="section-header">Transitions</div>
    <div class="transitions-panel">
      <div class="transitions-grid">
        <div class="field">
          <label>Target</label>
          <select id="fadeTarget"></select>
        </div>
        <div class="field">
          <label>Brightness</label>
          <input type="number" id="fadeBrightness" min="0" max="100" value="80">
        </div>
        <div class="field">
          <label>Duration (s)</label>
          <input type="number" id="fadeDuration" min="0.5" max="30" step="0.5" value="3">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="runFade()">Fade</button>
        <button class="btn btn-secondary" onclick="runBreathe()">Breathe</button>
      </div>
    </div>
  </section>

  <div class="kbd-bar">
    <span class="kbd-hint"><kbd>1</kbd>–<kbd>9</kbd> toggle device</span>
    <span class="kbd-hint"><kbd>Esc</kbd> all off</span>
    <span class="kbd-hint"><kbd>F</kbd> fade</span>
    <span class="kbd-hint"><kbd>B</kbd> breathe</span>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '';
let demoMode = false;
let lastRefreshed = null;

const DEMO_DEVICES = [
  { slug: 'living-room-top', name: 'Living Room Top', ip_address: '192.168.1.10', room: 'living-room', groups: ['ceiling'] },
  { slug: 'living-room-bottom', name: 'Living Room Bottom', ip_address: '192.168.1.11', room: 'living-room', groups: ['ceiling'] },
  { slug: 'living-room-lamp', name: 'Living Room Lamp', ip_address: '192.168.1.12', room: 'living-room', groups: ['floor'] },
  { slug: 'bedroom-main', name: 'Bedroom Main', ip_address: '192.168.1.20', room: 'bedroom', groups: ['ceiling'] },
  { slug: 'bedroom-nightstand', name: 'Bedroom Nightstand', ip_address: '192.168.1.21', room: 'bedroom', groups: ['accent'] },
  { slug: 'office-desk', name: 'Office Desk', ip_address: '192.168.1.30', room: 'office', groups: ['desk'] },
  { slug: 'office-shelf', name: 'Office Shelf', ip_address: '192.168.1.31', room: 'office', groups: ['accent'] },
];

const DEMO_SCENES = ['all-off', 'movie-time', 'reading', 'party', 'focus', 'goodnight'];

const DEMO_COLOURS = [
  { name: 'red', hue: 0, saturation: 1000, value: 1000 },
  { name: 'sunset-orange', hue: 20, saturation: 900, value: 800 },
  { name: 'orange', hue: 30, saturation: 1000, value: 1000 },
  { name: 'amber', hue: 38, saturation: 1000, value: 1000 },
  { name: 'warm-white', hue: 40, saturation: 200, value: 1000 },
  { name: 'gold', hue: 45, saturation: 900, value: 1000 },
  { name: 'yellow', hue: 60, saturation: 1000, value: 1000 },
  { name: 'lime', hue: 90, saturation: 1000, value: 1000 },
  { name: 'green', hue: 120, saturation: 1000, value: 1000 },
  { name: 'forest-green', hue: 140, saturation: 900, value: 600 },
  { name: 'teal', hue: 165, saturation: 900, value: 700 },
  { name: 'cyan', hue: 180, saturation: 1000, value: 1000 },
  { name: 'ice-blue', hue: 195, saturation: 500, value: 1000 },
  { name: 'daylight', hue: 200, saturation: 100, value: 1000 },
  { name: 'ocean-blue', hue: 210, saturation: 800, value: 700 },
  { name: 'moonlight', hue: 220, saturation: 150, value: 700 },
  { name: 'blue', hue: 240, saturation: 1000, value: 1000 },
  { name: 'lavender', hue: 260, saturation: 400, value: 900 },
  { name: 'purple', hue: 270, saturation: 1000, value: 1000 },
  { name: 'magenta', hue: 300, saturation: 1000, value: 1000 },
  { name: 'pink', hue: 330, saturation: 700, value: 1000 },
  { name: 'hot-pink', hue: 340, saturation: 900, value: 1000 },
  { name: 'crimson', hue: 348, saturation: 950, value: 800 },
  { name: 'coral', hue: 16, saturation: 800, value: 1000 },
  { name: 'candlelight', hue: 30, saturation: 600, value: 600 },
];

let devices = [];
let colourTarget = 'all';

function toast(message, type = 'success') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

async function api(method, path, body = null) {
  if (demoMode) return demoResponse(method, path, body);
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(`${API}${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function demoResponse(method, path, body) {
  if (path === '/devices') return DEMO_DEVICES;
  if (path === '/scenes') return DEMO_SCENES;
  if (path === '/colours') return DEMO_COLOURS;
  if (path.includes('/status')) return [{ target: path.split('/')[2], success: true, transport: 'demo', response: { dps: { '20': true } } }];
  if (method === 'POST') return [{ target: path.split('/')[2] || 'all', success: true, transport: 'demo', response: {} }];
  return {};
}

function hsvToHex(h, s, v) {
  s /= 1000; v /= 1000;
  const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r, g, b;
  if (h < 60) { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else { r = c; g = 0; b = x; }
  const hex = (n) => Math.round((n + m) * 255).toString(16).padStart(2, '0');
  return `#${hex(r)}${hex(g)}${hex(b)}`;
}

function hexToHsv(hex) {
  let r = parseInt(hex.slice(1, 3), 16) / 255;
  let g = parseInt(hex.slice(3, 5), 16) / 255;
  let b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d + 6) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  const s = max === 0 ? 0 : d / max;
  return { hue: Math.round(h), saturation: Math.round(s * 1000), value: Math.round(max * 1000) };
}

function formatRoom(slug) {
  return slug.replace(/-/g, ' ');
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  return `${m}m ago`;
}

async function loadDevices() {
  devices = await api('GET', '/devices');
  lastRefreshed = new Date();
  renderDevices();
  renderColourTargetBar();
  renderFadeTargets();
}

function renderColourTargetBar() {
  const bar = document.getElementById('colourTargetBar');
  const targets = [{ slug: 'all', name: 'All Devices' }, ...devices];
  bar.innerHTML = `<span class="label">Controlling</span>` +
    targets.map(t =>
      `<button class="target-pill${t.slug === colourTarget ? ' active' : ''}"
        onclick="selectColourTarget('${t.slug}')">${t.name}</button>`
    ).join('');
}

function selectColourTarget(slug) {
  colourTarget = slug;
  renderColourTargetBar();
  const name = slug === 'all' ? 'All Devices' : (devices.find(d => d.slug === slug)?.name || slug);
  toast(`Controlling: ${name}`);
}

function renderDevices() {
  const container = document.getElementById('devicesGrid');
  const rooms = new Map();
  let cardIndex = 0;
  devices.forEach(d => {
    const room = d.room || 'unassigned';
    if (!rooms.has(room)) rooms.set(room, []);
    rooms.get(room).push(d);
  });

  container.innerHTML = Array.from(rooms.entries()).map(([room, devs]) => `
    <div class="room-group">
      <div class="room-label">${formatRoom(room)}</div>
      <div class="room-devices">
        ${devs.map(d => {
          const bri = 70 + Math.floor(Math.random() * 30);
          const idx = cardIndex++;
          return `
          <div class="device-card" data-slug="${d.slug}" style="animation-delay: ${idx * 0.06}s">
            <div class="colour-strip"></div>
            <div class="device-header">
              <div class="device-info">
                <h3>${d.name}</h3>
                <div class="meta">${d.ip_address}</div>
              </div>
              <label class="toggle">
                <input type="checkbox" checked onchange="toggleDevice('${d.slug}', this.checked)">
                <span class="slider"></span>
              </label>
            </div>
            <div class="brightness-control">
              <div class="label-row">
                <span>Brightness</span>
                <span class="val">${bri}%</span>
              </div>
              <input type="range" min="0" max="100" value="${bri}"
                onchange="setBrightness('${d.slug}', this.value)"
                oninput="this.parentElement.querySelector('.val').textContent = this.value + '%'">
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function renderFadeTargets() {
  const select = document.getElementById('fadeTarget');
  const rooms = new Map();
  devices.forEach(d => {
    const room = d.room || 'unassigned';
    if (!rooms.has(room)) rooms.set(room, []);
    rooms.get(room).push(d);
  });
  let html = '<option value="all">All Devices</option>';
  rooms.forEach((devs, room) => {
    html += `<optgroup label="${formatRoom(room)}">`;
    devs.forEach(d => { html += `<option value="${d.slug}">${d.name}</option>`; });
    html += '</optgroup>';
  });
  select.innerHTML = html;
}

async function toggleDevice(slug, on) {
  const card = document.querySelector(`.device-card[data-slug="${slug}"]`);
  if (card) card.classList.toggle('off', !on);
  try {
    await api('POST', `/devices/${slug}/${on ? 'on' : 'off'}`);
    toast(`${slug} ${on ? 'on' : 'off'}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function setBrightness(slug, value) {
  try { await api('POST', `/devices/${slug}/brightness`, { brightness: parseInt(value) }); }
  catch (e) { toast(e.message, 'error'); }
}

async function loadColours() {
  const colours = await api('GET', '/colours');
  const grid = document.getElementById('colourGrid');
  const swatches = colours.map((c, i) => {
    const hex = hsvToHex(c.hue, c.saturation, c.value);
    return `<button class="colour-btn" style="background: ${hex}; --glow-colour: ${hex}80; animation-delay: ${i * 30}ms"
      onclick="applyColour('${c.name}', this)">
      <span class="tooltip">${c.name}</span>
    </button>`;
  }).join('');
  const picker = `<div class="colour-picker-inline" style="animation-delay: ${colours.length * 30}ms">
    <input type="color" id="customColour" value="#7c3aed" onchange="applyCustomColour()">
    <span class="picker-label">custom</span>
  </div>`;
  grid.innerHTML = swatches + picker;
}

function setActiveSwatch(btn) {
  document.querySelectorAll('.colour-btn.active').forEach(el => el.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
    btn.style.animation = 'colourPop 0.3s ease';
    setTimeout(() => btn.style.animation = '', 300);
  }
}

function updateColourStrips(hex) {
  const targetSlugs = colourTarget === 'all' ? devices.map(d => d.slug) : [colourTarget];
  targetSlugs.forEach(slug => {
    const card = document.querySelector(`.device-card[data-slug="${slug}"]`);
    if (!card) return;
    const strip = card.querySelector('.colour-strip');
    strip.style.background = hex;
    strip.style.setProperty('--strip-colour', hex + '80');
    strip.classList.add('active');
  });
}

async function applyColour(name, btn) {
  const targetName = colourTarget === 'all' ? 'All Devices' : (devices.find(d => d.slug === colourTarget)?.name || colourTarget);
  setActiveSwatch(btn);
  const hex = btn ? getComputedStyle(btn).backgroundColor : null;
  if (hex) {
    const match = hex.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
    if (match) {
      const toHex = n => parseInt(n).toString(16).padStart(2, '0');
      updateColourStrips(`#${toHex(match[1])}${toHex(match[2])}${toHex(match[3])}`);
    }
  }
  try {
    await api('POST', `/devices/${colourTarget}/colour`, { preset: name });
    toast(`${targetName} → ${name}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function applyCustomColour() {
  const hex = document.getElementById('customColour').value;
  const { hue, saturation, value } = hexToHsv(hex);
  const targetName = colourTarget === 'all' ? 'All Devices' : (devices.find(d => d.slug === colourTarget)?.name || colourTarget);
  setActiveSwatch(null);
  updateColourStrips(hex);
  try {
    await api('POST', `/devices/${colourTarget}/colour`, { hue, saturation, value });
    toast(`${targetName} → ${hex}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function loadScenes() {
  const scenes = await api('GET', '/scenes');
  const grid = document.getElementById('scenesGrid');
  grid.innerHTML = scenes.map(s =>
    `<button class="scene-btn" onclick="applyScene('${s}', this)">${s}</button>`
  ).join('');
}

const SCENE_THEMES = {
  'all-off':    { colour: null, power: false },
  'movie-time': { colour: '#e67e22' },
  'reading':    { colour: '#f5e6c8' },
  'party':      { colour: '#9b59b6' },
  'focus':      { colour: '#5dade2' },
  'goodnight':  { colour: '#e74c3c' },
};

async function applyScene(name, btn) {
  document.querySelectorAll('.scene-btn.active').forEach(el => el.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const theme = SCENE_THEMES[name];
  document.querySelectorAll('.device-card').forEach(card => {
    const toggle = card.querySelector('.toggle input');
    const strip = card.querySelector('.colour-strip');
    if (theme && theme.power === false) {
      card.classList.add('off');
      if (toggle) toggle.checked = false;
      strip.style.background = 'transparent';
      strip.classList.remove('active');
    } else {
      card.classList.remove('off');
      if (toggle) toggle.checked = true;
      if (theme && theme.colour) {
        strip.style.background = theme.colour;
        strip.style.setProperty('--strip-colour', theme.colour + '80');
        strip.classList.add('active');
      }
    }
  });

  try {
    await api('POST', `/scenes/${name}`);
    toast(`Scene: ${name}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function runFade() {
  const target = document.getElementById('fadeTarget').value;
  const brightness = parseInt(document.getElementById('fadeBrightness').value);
  const duration = parseFloat(document.getElementById('fadeDuration').value);
  try {
    toast(`Fading ${target}...`);
    await api('POST', `/devices/${target}/fade`, { brightness, duration, start: 0, steps: 20 });
    toast('Fade complete');
  } catch (e) { toast(e.message, 'error'); }
}

async function runBreathe() {
  const target = document.getElementById('fadeTarget').value;
  const duration = parseFloat(document.getElementById('fadeDuration').value);
  try {
    toast(`Breathing ${target}...`);
    await api('POST', `/devices/${target}/breathe`, { cycles: 3, cycle_duration: duration, low: 10, high: 90 });
    toast('Breathe complete');
  } catch (e) { toast(e.message, 'error'); }
}

function updateStatus() {
  const pill = document.getElementById('statusPill');
  const ts = lastRefreshed ? ` · ${timeAgo(lastRefreshed)}` : '';
  pill.innerHTML = `
    <span class="dot${demoMode ? ' demo' : ''}"></span>
    <span>${demoMode ? 'Demo · ' : ''}${devices.length} device${devices.length !== 1 ? 's' : ''}${!demoMode ? ' · LAN' : ''}${ts}</span>
  `;
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const num = parseInt(e.key);
  if (num >= 1 && num <= devices.length) {
    const d = devices[num - 1];
    const card = document.querySelector(`[data-slug="${d.slug}"] .toggle input`);
    if (card) { card.checked = !card.checked; toggleDevice(d.slug, card.checked); }
    return;
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.device-card').forEach(card => {
      card.classList.add('off');
      const toggle = card.querySelector('.toggle input');
      if (toggle) toggle.checked = false;
    });
    document.querySelectorAll('.scene-btn.active').forEach(el => el.classList.remove('active'));
    const allOffBtn = document.querySelector('.scene-btn');
    if (allOffBtn && allOffBtn.textContent === 'all-off') allOffBtn.classList.add('active');
    api('POST', '/devices/all/off').then(() => toast('All off')).catch(e => toast(e.message, 'error'));
    return;
  }
  if (e.key.toLowerCase() === 'f') { runFade(); return; }
  if (e.key.toLowerCase() === 'b') { runBreathe(); return; }
});

async function init() {
  try {
    const res = await fetch('/devices');
    if (!res.ok) throw new Error();
    await Promise.all([loadDevices(), loadColours(), loadScenes()]);
  } catch {
    demoMode = true;
    document.querySelector('.subtitle').textContent = 'Interactive demo — connect API for live control';
    await Promise.all([loadDevices(), loadColours(), loadScenes()]);
  }
  updateStatus();
  setInterval(updateStatus, 5000);
}

init();
</script>
