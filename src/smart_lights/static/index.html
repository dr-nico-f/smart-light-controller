<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Light Controller</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08090d;
  --surface: rgba(255, 255, 255, 0.03);
  --surface-border: rgba(255, 255, 255, 0.06);
  --surface-hover: rgba(255, 255, 255, 0.06);
  --glass: rgba(15, 18, 30, 0.7);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text: #f0f0f3;
  --text-secondary: #9ca3af;
  --text-dim: #6b7280;
  --accent: #7c3aed;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --accent-soft: rgba(124, 58, 237, 0.15);
  --success: #10b981;
  --success-glow: rgba(16, 185, 129, 0.4);
  --danger: #ef4444;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background orbs */
body::before,
body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: -1;
  opacity: 0.6;
}

body::before {
  width: 600px;
  height: 600px;
  top: -10%;
  left: -5%;
  background: radial-gradient(circle, rgba(124, 58, 237, 0.3) 0%, transparent 70%);
  animation: orbFloat1 14s ease-in-out infinite alternate;
}

body::after {
  width: 500px;
  height: 500px;
  bottom: -10%;
  right: -5%;
  background: radial-gradient(circle, rgba(16, 185, 129, 0.2) 0%, transparent 70%);
  animation: orbFloat2 18s ease-in-out infinite alternate;
}

@keyframes orbFloat1 {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(4vw, 6vh) scale(1.1); }
  100% { transform: translate(-2vw, 3vh) scale(0.95); }
}

@keyframes orbFloat2 {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-5vw, -4vh) scale(1.05); }
  100% { transform: translate(3vw, -6vh) scale(0.9); }
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 48px;
}

header h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header .subtitle {
  color: var(--text-secondary);
  margin-top: 6px;
  font-size: 0.9rem;
  font-weight: 400;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 20px;
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.status-pill .dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 8px var(--success-glow);
  animation: pulse 2s ease-in-out infinite;
}

.status-pill .dot.demo { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Section Headers */
.section-header {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-bottom: 16px;
  padding-left: 2px;
}

section { margin-bottom: 40px; }

/* Device Grid */
.devices-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px;
}

.device-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.device-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.05) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}

.device-card:hover {
  border-color: rgba(124, 58, 237, 0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(124, 58, 237, 0.1);
}

.device-card:hover::before { opacity: 1; }

.device-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
  position: relative;
}

.device-info h3 {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
}

.device-info .meta {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 3px;
}

/* Toggle */
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
  flex-shrink: 0;
}

.toggle input { display: none; }

.toggle .slider {
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 11px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.toggle .slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: var(--text-secondary);
  border-radius: 50%;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.toggle input:checked + .slider {
  background: var(--success);
  box-shadow: 0 0 12px var(--success-glow);
}

.toggle input:checked + .slider::before {
  transform: translateX(18px);
  background: white;
}

/* Brightness Slider */
.brightness-control {
  position: relative;
  margin-top: 14px;
}

.brightness-control .label-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.brightness-control .label-row .val {
  color: var(--text-secondary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.2) 100%);
  outline: none;
  transition: height 0.2s;
}

input[type="range"]:hover { height: 6px; }

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.3);
  box-shadow: 0 0 12px rgba(255,255,255,0.5);
}

/* Colour Presets */
.colour-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 4px;
}

.colour-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
}

.colour-btn:hover {
  transform: scale(1.35);
  border-color: rgba(255, 255, 255, 0.8);
  box-shadow: 0 0 16px var(--glow-colour, rgba(255,255,255,0.3));
}

.colour-btn .tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 0.68rem;
  white-space: nowrap;
  pointer-events: none;
  color: var(--text);
}

.colour-btn:hover .tooltip { display: block; }

/* Scenes */
.scenes-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.scene-btn {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.scene-btn:hover {
  background: var(--accent-soft);
  border-color: rgba(124, 58, 237, 0.4);
  color: var(--text);
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.2);
  transform: translateY(-1px);
}

.scene-btn:active {
  transform: translateY(0);
  background: var(--accent);
  color: white;
}

/* Transitions Panel */
.transitions-panel {
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 24px;
}

.transitions-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 16px;
  align-items: end;
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field select,
.field input[type="number"] {
  width: 100%;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 0.85rem;
  transition: border-color 0.2s;
}

.field select:focus,
.field input[type="number"]:focus {
  outline: none;
  border-color: rgba(124, 58, 237, 0.5);
}

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btn {
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #6d28d9);
  color: white;
  box-shadow: 0 4px 16px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-secondary {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  color: var(--text-secondary);
}

.btn-secondary:hover {
  background: var(--surface-hover);
  color: var(--text);
  border-color: rgba(255,255,255,0.12);
}

/* Toast */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1000;
}

.toast {
  background: var(--glass);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 0.8rem;
  animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  max-width: 320px;
  color: var(--text-secondary);
}

.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(30px) scale(0.95); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

/* Responsive */
@media (max-width: 768px) {
  .devices-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .transitions-grid { grid-template-columns: 1fr; }
  .container { padding: 24px 16px; }
  header h1 { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Smart Light Controller</h1>
    <p class="subtitle">Local-first Tuya bulb control</p>
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span>Connecting...</span>
    </div>
  </header>

  <section>
    <div class="section-header">Devices</div>
    <div class="devices-grid" id="devicesGrid"></div>
  </section>

  <section>
    <div class="section-header">Colour Presets</div>
    <div class="colour-grid" id="colourGrid"></div>
  </section>

  <section>
    <div class="section-header">Scenes</div>
    <div class="scenes-grid" id="scenesGrid"></div>
  </section>

  <section>
    <div class="section-header">Transitions</div>
    <div class="transitions-panel">
      <div class="transitions-grid">
        <div class="field">
          <label>Target</label>
          <select id="fadeTarget"></select>
        </div>
        <div class="field">
          <label>Brightness</label>
          <input type="number" id="fadeBrightness" min="0" max="100" value="80">
        </div>
        <div class="field">
          <label>Duration (s)</label>
          <input type="number" id="fadeDuration" min="0.5" max="30" step="0.5" value="3">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="runFade()">Fade</button>
        <button class="btn btn-secondary" onclick="runBreathe()">Breathe</button>
      </div>
    </div>
  </section>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '';
let demoMode = false;

const DEMO_DEVICES = [
  { slug: 'living-room-top', name: 'Living Room Top', ip_address: '192.168.1.10', room: 'living-room', groups: ['ceiling'] },
  { slug: 'living-room-bottom', name: 'Living Room Bottom', ip_address: '192.168.1.11', room: 'living-room', groups: ['ceiling'] },
  { slug: 'living-room-lamp', name: 'Living Room Lamp', ip_address: '192.168.1.12', room: 'living-room', groups: ['floor'] },
  { slug: 'bedroom-main', name: 'Bedroom Main', ip_address: '192.168.1.20', room: 'bedroom', groups: ['ceiling'] },
  { slug: 'office-desk', name: 'Office Desk', ip_address: '192.168.1.30', room: 'office', groups: ['desk'] },
];

const DEMO_SCENES = ['all-off', 'movie-time', 'reading', 'party', 'focus', 'goodnight'];

const DEMO_COLOURS = [
  { name: 'red', hue: 0, saturation: 1000, value: 1000 },
  { name: 'sunset-orange', hue: 20, saturation: 900, value: 800 },
  { name: 'orange', hue: 30, saturation: 1000, value: 1000 },
  { name: 'amber', hue: 38, saturation: 1000, value: 1000 },
  { name: 'warm-white', hue: 40, saturation: 200, value: 1000 },
  { name: 'gold', hue: 45, saturation: 900, value: 1000 },
  { name: 'yellow', hue: 60, saturation: 1000, value: 1000 },
  { name: 'lime', hue: 90, saturation: 1000, value: 1000 },
  { name: 'green', hue: 120, saturation: 1000, value: 1000 },
  { name: 'forest-green', hue: 140, saturation: 900, value: 600 },
  { name: 'teal', hue: 165, saturation: 900, value: 700 },
  { name: 'cyan', hue: 180, saturation: 1000, value: 1000 },
  { name: 'ice-blue', hue: 195, saturation: 500, value: 1000 },
  { name: 'daylight', hue: 200, saturation: 100, value: 1000 },
  { name: 'ocean-blue', hue: 210, saturation: 800, value: 700 },
  { name: 'moonlight', hue: 220, saturation: 150, value: 700 },
  { name: 'blue', hue: 240, saturation: 1000, value: 1000 },
  { name: 'lavender', hue: 260, saturation: 400, value: 900 },
  { name: 'purple', hue: 270, saturation: 1000, value: 1000 },
  { name: 'magenta', hue: 300, saturation: 1000, value: 1000 },
  { name: 'pink', hue: 330, saturation: 700, value: 1000 },
  { name: 'hot-pink', hue: 340, saturation: 900, value: 1000 },
  { name: 'crimson', hue: 348, saturation: 950, value: 800 },
  { name: 'coral', hue: 16, saturation: 800, value: 1000 },
  { name: 'candlelight', hue: 30, saturation: 600, value: 600 },
];

let devices = [];

function toast(message, type = 'success') {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

async function api(method, path, body = null) {
  if (demoMode) return demoResponse(method, path, body);
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(`${API}${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function demoResponse(method, path, body) {
  if (path === '/devices') return DEMO_DEVICES;
  if (path === '/scenes') return DEMO_SCENES;
  if (path === '/colours') return DEMO_COLOURS;
  if (path.includes('/status')) return [{ target: path.split('/')[2], success: true, transport: 'demo', response: { dps: { '20': true } } }];
  if (method === 'POST') return [{ target: path.split('/')[2] || 'all', success: true, transport: 'demo', response: {} }];
  return {};
}

function hsvToHex(h, s, v) {
  s /= 1000; v /= 1000;
  const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r, g, b;
  if (h < 60) { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else { r = c; g = 0; b = x; }
  const hex = (n) => Math.round((n + m) * 255).toString(16).padStart(2, '0');
  return `#${hex(r)}${hex(g)}${hex(b)}`;
}

async function loadDevices() {
  devices = await api('GET', '/devices');
  renderDevices();
  renderFadeTargets();
}

function renderDevices() {
  const grid = document.getElementById('devicesGrid');
  grid.innerHTML = devices.map(d => `
    <div class="device-card" data-slug="${d.slug}">
      <div class="device-header">
        <div class="device-info">
          <h3>${d.name}</h3>
          <div class="meta">${d.room || 'unassigned'} · ${d.ip_address}</div>
        </div>
        <label class="toggle">
          <input type="checkbox" checked onchange="toggleDevice('${d.slug}', this.checked)">
          <span class="slider"></span>
        </label>
      </div>
      <div class="brightness-control">
        <div class="label-row">
          <span>Brightness</span>
          <span class="val">${70 + Math.floor(Math.random() * 30)}%</span>
        </div>
        <input type="range" min="0" max="100" value="${70 + Math.floor(Math.random() * 30)}"
          onchange="setBrightness('${d.slug}', this.value)"
          oninput="this.parentElement.querySelector('.val').textContent = this.value + '%'">
      </div>
    </div>
  `).join('');
}

function renderFadeTargets() {
  const select = document.getElementById('fadeTarget');
  const options = [{ slug: 'all', name: 'All Devices' }, ...devices];
  select.innerHTML = options.map(d => `<option value="${d.slug}">${d.name}</option>`).join('');
}

async function toggleDevice(slug, on) {
  try {
    await api('POST', `/devices/${slug}/${on ? 'on' : 'off'}`);
    toast(`${slug} ${on ? 'on' : 'off'}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function setBrightness(slug, value) {
  try { await api('POST', `/devices/${slug}/brightness`, { brightness: parseInt(value) }); }
  catch (e) { toast(e.message, 'error'); }
}

async function loadColours() {
  const colours = await api('GET', '/colours');
  const grid = document.getElementById('colourGrid');
  grid.innerHTML = colours.map(c => {
    const hex = hsvToHex(c.hue, c.saturation, c.value);
    return `<button class="colour-btn" style="background: ${hex}; --glow-colour: ${hex}80"
      onclick="applyColour('${c.name}')">
      <span class="tooltip">${c.name}</span>
    </button>`;
  }).join('');
}

async function applyColour(name) {
  const target = document.getElementById('fadeTarget').value;
  try {
    await api('POST', `/devices/${target}/colour`, { preset: name });
    toast(`${target} → ${name}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function loadScenes() {
  const scenes = await api('GET', '/scenes');
  const grid = document.getElementById('scenesGrid');
  grid.innerHTML = scenes.map(s =>
    `<button class="scene-btn" onclick="applyScene('${s}')">${s}</button>`
  ).join('');
}

async function applyScene(name) {
  try {
    await api('POST', `/scenes/${name}`);
    toast(`Scene: ${name}`);
  } catch (e) { toast(e.message, 'error'); }
}

async function runFade() {
  const target = document.getElementById('fadeTarget').value;
  const brightness = parseInt(document.getElementById('fadeBrightness').value);
  const duration = parseFloat(document.getElementById('fadeDuration').value);
  try {
    toast(`Fading ${target}...`);
    await api('POST', `/devices/${target}/fade`, { brightness, duration, start: 0, steps: 20 });
    toast('Fade complete');
  } catch (e) { toast(e.message, 'error'); }
}

async function runBreathe() {
  const target = document.getElementById('fadeTarget').value;
  const duration = parseFloat(document.getElementById('fadeDuration').value);
  try {
    toast(`Breathing ${target}...`);
    await api('POST', `/devices/${target}/breathe`, { cycles: 3, cycle_duration: duration, low: 10, high: 90 });
    toast('Breathe complete');
  } catch (e) { toast(e.message, 'error'); }
}

function updateStatus() {
  const pill = document.getElementById('statusPill');
  pill.innerHTML = `
    <span class="dot${demoMode ? ' demo' : ''}"></span>
    <span>${demoMode ? 'Demo · ' : ''}${devices.length} device${devices.length !== 1 ? 's' : ''}${!demoMode ? ' · LAN' : ''}</span>
  `;
}

async function init() {
  try {
    const res = await fetch('/devices');
    if (!res.ok) throw new Error();
    await Promise.all([loadDevices(), loadColours(), loadScenes()]);
  } catch {
    demoMode = true;
    document.querySelector('.subtitle').textContent = 'Interactive demo — connect API for live control';
    await Promise.all([loadDevices(), loadColours(), loadScenes()]);
  }
  updateStatus();
}

init();
</script>
</body>
</html>
